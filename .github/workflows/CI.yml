name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  test:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.8
      uses: actions/setup-python@v5
      with:
        python-version: "3.8"

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: "20"
        cache: npm
        cache-dependency-path: frontend/package-lock.json

    - name: Install Python dependencies
      run: |
        pip install -U pip
        pip install .
        pip install ".[dev]"

    - name: Build frontend
      run: |
        cd frontend
        npm ci
        npm run build

    - name: Test with pytest
      run: PYTHONPATH=src pytest -v

    - name: Test coverage
      run: PYTHONPATH=src pytest --cov annotation_transfer_tool
